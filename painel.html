<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fadefy — Painel do Dono</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --graphite-900:#1c1f24;--graphite-800:#23272e;--graphite-700:#2d323b;
    --graphite-600:#3a4049;--steel-400:#7c8696;--steel-300:#9aa3b2;
    --mist-200:#c7cdd6;--mist-100:#e7eaf0;--paper:#f4f6f9;--white:#fff;
    --mint:#3ddc97;--mint-deep:#27b87b;--mint-soft:rgba(61,220,151,.12);
    --red:#e05a64;--red-soft:rgba(224,90,100,.1);
    --amber:#e0a23a;--amber-soft:rgba(224,162,58,.12);
    --radius:18px;--radius-sm:12px;
    --shadow:0 12px 40px -16px rgba(28,31,36,.22);
    --shadow-soft:0 24px 60px -20px rgba(28,31,36,.28);
    --font-display:'Sora',sans-serif;--font-body:'Outfit',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font-body);background:var(--paper);color:var(--graphite-800);line-height:1.55;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:-.02em;color:var(--graphite-900)}
  button{font-family:var(--font-body);cursor:pointer}

  /* ============ LOGIN ============ */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
  .login-wrap::before{content:"";position:absolute;inset:0;background:radial-gradient(700px 500px at 75% 10%,rgba(61,220,151,.12),transparent 60%),radial-gradient(600px 600px at 10% 90%,rgba(124,134,150,.16),transparent 55%)}
  .login-card{position:relative;z-index:1;background:var(--white);border:1px solid rgba(28,31,36,.07);border-radius:26px;box-shadow:var(--shadow-soft);padding:42px 38px;width:100%;max-width:410px}
  .login-brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
  .login-brand img{width:46px;height:46px;border-radius:12px}
  .login-brand .lb-name{font-family:var(--font-display);font-weight:700;font-size:1.4rem;color:var(--graphite-900)}
  .login-brand .lb-sub{font-size:.78rem;color:var(--steel-400)}
  .login-card h2{font-size:1.5rem;margin-bottom:5px}
  .login-card .lc-lead{color:var(--steel-400);font-size:.94rem;margin-bottom:26px}
  .seg{display:flex;background:var(--paper);border-radius:12px;padding:4px;margin-bottom:22px}
  .seg button{flex:1;border:none;background:none;padding:9px;border-radius:9px;font-weight:600;font-size:.88rem;color:var(--steel-400);transition:.2s}
  .seg button.on{background:var(--white);color:var(--graphite-900);box-shadow:0 2px 8px -2px rgba(28,31,36,.18)}

  .field{margin-bottom:15px}
  .field label{display:block;font-size:.82rem;font-weight:600;color:var(--graphite-700);margin-bottom:7px}
  .field input{width:100%;background:var(--white);border:1.5px solid var(--mist-100);border-radius:var(--radius-sm);padding:14px 15px;font-family:var(--font-body);font-size:.98rem;color:var(--graphite-900);transition:.2s}
  .field input:focus{outline:none;border-color:var(--mint);box-shadow:0 0 0 4px var(--mint-soft)}

  .btn{font-family:var(--font-display);font-weight:600;border:none;border-radius:13px;transition:transform .18s,box-shadow .22s,opacity .2s,background .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn-block{width:100%;padding:15px;font-size:1rem}
  .btn-primary{background:var(--graphite-900);color:#fff}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 30px -10px rgba(28,31,36,.5)}
  .btn-mint{background:var(--mint);color:var(--graphite-900)}
  .btn-mint:hover{transform:translateY(-2px);box-shadow:0 14px 32px -10px rgba(39,184,123,.55)}
  .btn-sm{padding:8px 14px;font-size:.84rem;border-radius:10px}
  .btn-ghost{background:transparent;border:1.5px solid var(--mist-100);color:var(--graphite-700)}
  .btn-ghost:hover{border-color:var(--graphite-700)}
  .btn-danger{background:var(--red-soft);color:var(--red)}
  .btn-danger:hover{background:var(--red);color:#fff}
  .btn:disabled{opacity:.4;pointer-events:none}
  .opt-pill{flex:1;background:#fff;border:1.5px solid var(--mist-100);border-radius:12px;padding:13px 10px;font-family:var(--font-body);font-weight:600;font-size:.9rem;color:var(--graphite-700);transition:.16s}
  .opt-pill:hover{border-color:var(--steel-300)}
  .opt-pill.sel{border-color:var(--mint);background:var(--mint-soft);color:var(--mint-deep)}
  .login-hint{font-size:.78rem;color:var(--steel-400);text-align:center;margin-top:18px;line-height:1.5}
  .login-hint code{background:var(--paper);padding:2px 6px;border-radius:5px;color:var(--graphite-700);font-family:monospace}

  /* ============ APP SHELL ============ */
  .shell{display:flex;min-height:100vh}
  .sidebar{width:248px;background:var(--graphite-900);color:var(--mist-200);display:flex;flex-direction:column;padding:24px 16px;position:sticky;top:0;height:100vh;flex-shrink:0}
  .sb-brand{display:flex;align-items:center;gap:11px;padding:0 8px 24px;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08)}
  .sb-brand img{width:38px;height:38px;border-radius:10px}
  .sb-brand .sb-name{font-family:var(--font-display);font-weight:700;font-size:1.18rem;color:#fff;line-height:1}
  .sb-brand .sb-sub{font-size:.7rem;color:var(--steel-400)}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:14px;flex:1}
  .nav button{display:flex;align-items:center;gap:12px;background:none;border:none;color:var(--steel-300);padding:11px 14px;border-radius:11px;font-size:.94rem;font-weight:500;text-align:left;transition:.18s}
  .nav button svg{flex-shrink:0;opacity:.8}
  .nav button:hover{background:rgba(255,255,255,.05);color:#fff}
  .nav button.on{background:var(--mint);color:var(--graphite-900);font-weight:600}
  .nav button.on svg{opacity:1}
  .sb-foot{padding:14px 8px 0;border-top:1px solid rgba(255,255,255,.08)}
  .sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px}
  .sb-user .av{width:34px;height:34px;border-radius:9px;background:var(--graphite-600);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-weight:700;font-size:.9rem}
  .sb-user .u-name{font-size:.86rem;color:#fff;font-weight:600;line-height:1.1}
  .sb-user .u-role{font-size:.7rem;color:var(--steel-400)}
  .sb-logout{margin-top:8px;width:100%;background:none;border:none;color:var(--steel-400);font-size:.82rem;text-align:left;padding:8px 10px;border-radius:9px;display:flex;align-items:center;gap:8px;transition:.18s}
  .sb-logout:hover{background:rgba(224,90,100,.12);color:var(--red)}

  .main{flex:1;padding:30px 36px 60px;max-width:1180px;overflow-x:hidden}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:26px;flex-wrap:wrap}
  .page-head .ph-eyebrow{font-family:var(--font-display);font-weight:600;font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mint-deep);margin-bottom:6px}
  .page-head h1{font-size:1.7rem}
  .page-head .ph-sub{color:var(--steel-400);font-size:.94rem;margin-top:3px}

  /* date nav */
  .datenav{display:flex;align-items:center;gap:8px}
  .datenav button{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--mist-100);background:#fff;color:var(--graphite-700);display:flex;align-items:center;justify-content:center;transition:.18s}
  .datenav button:hover{border-color:var(--graphite-700)}
  .datenav .dn-label{font-family:var(--font-display);font-weight:600;font-size:.95rem;min-width:160px;text-align:center;text-transform:capitalize}

  /* cards */
  .card{background:#fff;border:1px solid rgba(28,31,36,.06);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .card-pad{padding:22px}

  /* KPI grid */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .kpi{background:#fff;border:1px solid rgba(28,31,36,.06);border-radius:var(--radius);padding:20px}
  .kpi .k-ic{width:40px;height:40px;border-radius:11px;background:var(--graphite-900);color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:13px}
  .kpi.mint .k-ic{background:var(--mint);color:var(--graphite-900)}
  .kpi .k-num{font-family:var(--font-display);font-weight:700;font-size:1.7rem;color:var(--graphite-900);line-height:1}
  .kpi .k-num small{font-size:.9rem}
  .kpi .k-lab{font-size:.85rem;color:var(--steel-400);margin-top:5px}

  /* agenda timeline */
  .agenda-list{display:flex;flex-direction:column}
  .slot{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--mist-100);align-items:center}
  .slot:last-child{border-bottom:none}
  .slot .s-time{font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--graphite-900);width:54px;flex-shrink:0}
  .slot .s-body{flex:1;min-width:0}
  .slot .s-client{font-weight:600;color:var(--graphite-900)}
  .slot .s-meta{font-size:.83rem;color:var(--steel-400);margin-top:1px}
  .slot .s-tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:5px}
  .tag{font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:99px}
  .tag.svc{background:var(--mist-100);color:var(--graphite-700)}
  .tag.bb{background:var(--graphite-900);color:#fff}
  .tag.ok{background:var(--mint-soft);color:var(--mint-deep)}
  .tag.cancel{background:var(--red-soft);color:var(--red)}
  .tag.block{background:var(--amber-soft);color:var(--amber)}
  .slot .s-actions{display:flex;gap:6px;flex-shrink:0}
  .icon-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--mist-100);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--steel-400);transition:.16s}
  .icon-btn:hover{color:var(--graphite-900);border-color:var(--graphite-700)}
  .icon-btn.ok:hover{color:var(--mint-deep);border-color:var(--mint);background:var(--mint-soft)}
  .icon-btn.del:hover{color:var(--red);border-color:var(--red);background:var(--red-soft)}
  .slot.free{opacity:.85}
  .slot.free .s-body{color:var(--steel-400)}
  .slot.is-cancel{opacity:.55}
  .slot.is-block{background:var(--amber-soft)}

  /* week grid */
  .week-grid{display:grid;grid-template-columns:60px repeat(6,1fr);gap:1px;background:var(--mist-100);border-radius:var(--radius);overflow:hidden;font-size:.78rem}
  .week-grid .wg-cell{background:#fff;padding:8px 6px;min-height:42px}
  .week-grid .wg-head{background:var(--graphite-900);color:#fff;font-family:var(--font-display);font-weight:600;text-align:center;padding:11px 4px;font-size:.8rem}
  .week-grid .wg-head small{display:block;font-weight:400;color:var(--steel-300);font-size:.68rem}
  .week-grid .wg-time{background:var(--paper);font-weight:600;color:var(--steel-400);display:flex;align-items:center;justify-content:center}
  .wg-appt{background:var(--mint-soft);border-left:3px solid var(--mint);border-radius:5px;padding:4px 6px;font-size:.72rem;line-height:1.25;color:var(--graphite-800);height:100%}
  .wg-appt .wa-c{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wg-appt.blk{background:var(--amber-soft);border-color:var(--amber)}

  /* tables (serviços/barbeiros) */
  .tbl{width:100%;border-collapse:collapse}
  .tbl th{text-align:left;font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--steel-400);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--mist-100)}
  .tbl td{padding:14px;border-bottom:1px solid var(--mist-100);font-size:.93rem}
  .tbl tr:last-child td{border-bottom:none}
  .tbl .t-name{font-weight:600;color:var(--graphite-900)}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:.76rem;font-weight:600;padding:4px 10px;border-radius:99px}
  .badge.on{background:var(--mint-soft);color:var(--mint-deep)}
  .badge.off{background:var(--mist-100);color:var(--steel-400)}

  .sec-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
  .sec-title h3{font-size:1.15rem}

  /* config / funcionamento */
  .func-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--mist-100)}
  .func-row:last-child{border-bottom:none}
  .func-row .fr-day{font-weight:600;width:110px;color:var(--graphite-900)}
  .func-row input[type=time]{border:1.5px solid var(--mist-100);border-radius:9px;padding:8px 10px;font-family:var(--font-body);font-size:.9rem}
  .func-row .fr-times{display:flex;align-items:center;gap:8px;color:var(--steel-400);font-size:.9rem}
  .switch{position:relative;width:44px;height:25px;flex-shrink:0}
  .switch input{opacity:0;width:0;height:0}
  .switch .sl{position:absolute;inset:0;background:var(--mist-200);border-radius:99px;transition:.2s;cursor:pointer}
  .switch .sl::before{content:"";position:absolute;width:19px;height:19px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked + .sl{background:var(--mint)}
  .switch input:checked + .sl::before{transform:translateX(19px)}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(28,31,36,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;animation:fade .2s}
  .modal{background:#fff;border-radius:22px;box-shadow:var(--shadow-soft);width:100%;max-width:440px;padding:28px;animation:pop .25s cubic-bezier(.2,.8,.3,1.2)}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .modal h3{font-size:1.3rem;margin-bottom:5px}
  .modal .m-sub{color:var(--steel-400);font-size:.9rem;margin-bottom:22px}
  .modal-actions{display:flex;gap:10px;margin-top:24px}
  .modal-actions .btn{flex:1;padding:13px}

  @keyframes fade{from{opacity:0}to{opacity:1}}
  .center-load{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--steel-400);padding:70px 20px;text-align:center}
  .spinner{width:22px;height:22px;border:2.5px solid rgba(28,31,36,.2);border-top-color:var(--graphite-900);border-radius:50%;animation:spin .7s linear infinite}
  .spinner.light{border-color:rgba(255,255,255,.35);border-top-color:#fff}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;color:var(--steel-400);padding:40px 16px;font-size:.93rem}
  .alert{border-radius:var(--radius-sm);padding:12px 15px;font-size:.88rem;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
  .alert.err{background:var(--red-soft);color:var(--red)}
  .alert.warn{background:var(--amber-soft);color:#9a7415}
  .config-note{background:var(--graphite-900);color:var(--mist-200);font-size:.8rem;padding:10px 16px;text-align:center}
  .config-note code{color:var(--mint);font-family:monospace}
  .hide{display:none!important}

  /* responsivo */
  @media(max-width:880px){
    .sidebar{position:fixed;left:0;top:0;z-index:90;transform:translateX(-100%);transition:transform .25s;box-shadow:var(--shadow-soft)}
    .sidebar.open{transform:none}
    .main{padding:20px 18px 60px}
    .kpis{grid-template-columns:1fr 1fr}
    .menu-toggle{display:flex!important}
    .week-grid{font-size:.66rem}
  }
  .menu-toggle{display:none;width:40px;height:40px;border-radius:10px;border:1.5px solid var(--mist-100);background:#fff;align-items:center;justify-content:center;margin-bottom:16px}
  @media(max-width:520px){.kpis{grid-template-columns:1fr}.week-grid{overflow-x:auto}}
</style>
</head>
<body>

<div class="config-note" id="configNote">
  ⚙️ Preencha <code>SUPABASE_URL</code> e <code>SUPABASE_ANON_KEY</code> no código para conectar ao banco. Rode também o <code>fadefy-supabase-dono.sql</code>.
</div>

<div id="root"></div>

<script>
/* ============================================================
   CONFIGURAÇÃO Supabase (Project Settings > API)
   ============================================================ */
const SUPABASE_URL      = "COLE_SUA_PROJECT_URL_AQUI";
const SUPABASE_ANON_KEY = "COLE_SUA_ANON_KEY_AQUI";
const BARBEARIA_NOME    = "Barbearia Navalha";

/* Acesso do dono (MVP simples por senha/token).
   Em produção, use o Supabase Auth — ver observações na entrega. */
const DONO_SENHA = "fadefy123";
const DONO_TOKEN = "FADEFY-DEMO-TOKEN";
/* ============================================================ */

const configurado = !SUPABASE_URL.includes("COLE_") && !SUPABASE_ANON_KEY.includes("COLE_");
let sb = configurado ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
if(configurado) document.getElementById("configNote").classList.add("hide");

const root = document.getElementById("root");

/* estado global */
const app = {
  logado:false,
  view:"agenda",            // agenda | semana | dashboard | clientes | servicos | barbeiros | config
  dataAtual:new Date(),
  servicos:[], barbeiros:[], funcionamento:[],
  cache:{},                 // agendamentos por data
};

/* ---------- helpers ---------- */
const NOMES_DIA=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
const MESES=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
function iso(d){ return d.toISOString().slice(0,10); }
function brl(v){ return "R$ "+Number(v).toFixed(2).replace(".",","); }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmtDataLonga(d){ return `${NOMES_DIA[d.getDay()]}, ${d.getDate()} de ${MESES[d.getMonth()]}`; }

/* dados demo (sem banco) */
function demoData(){
  app.servicos=[
    {id:1,nome:"Corte masculino",preco:40,duracao_min:30,ativo:true},
    {id:2,nome:"Barba",preco:30,duracao_min:20,ativo:true},
    {id:3,nome:"Corte + barba",preco:65,duracao_min:50,ativo:true},
    {id:4,nome:"Sobrancelha",preco:15,duracao_min:10,ativo:true},
    {id:5,nome:"Pezinho",preco:20,duracao_min:15,ativo:true},
    {id:6,nome:"Combo completo",preco:90,duracao_min:70,ativo:false},
  ];
  app.barbeiros=[{id:1,nome:"Pedro",ativo:true},{id:2,nome:"Lucas",ativo:true},{id:3,nome:"Rafael",ativo:false}];
  app.funcionamento=[
    {dia_semana:0,aberto:false,hora_inicio:"09:00",hora_fim:"19:00"},
    {dia_semana:1,aberto:true,hora_inicio:"09:00",hora_fim:"19:00"},
    {dia_semana:2,aberto:true,hora_inicio:"09:00",hora_fim:"19:00"},
    {dia_semana:3,aberto:true,hora_inicio:"09:00",hora_fim:"19:00"},
    {dia_semana:4,aberto:true,hora_inicio:"09:00",hora_fim:"19:00"},
    {dia_semana:5,aberto:true,hora_inicio:"09:00",hora_fim:"20:00"},
    {dia_semana:6,aberto:true,hora_inicio:"08:00",hora_fim:"18:00"},
  ];
  app.configLembrete={ativo:true,antecedencia:30,canal:"whatsapp"};
}
function demoAgenda(dataIso){
  // gera agendamentos fictícios determinísticos por data
  const seed=[...dataIso].reduce((a,c)=>a+c.charCodeAt(0),0);
  const clientes=["João Silva","Marcos Lima","Bruno Alves","Carlos Dias","Rafael Souza","Tiago Melo","André Reis","Felipe Costa"];
  const out=[]; const horas=["09:00","09:30","10:30","11:00","14:00","15:00","16:30","17:30"];
  horas.forEach((h,i)=>{
    if((seed+i)%3!==0){
      const sv=app.servicos[(seed+i)%app.servicos.length];
      const bb=app.barbeiros[(seed+i)%2];
      const cidx=(seed+i)%clientes.length;
      // simula data de cadastro: alguns clientes "novos" (cadastrados nesta data), outros antigos
      const novo=(seed+i)%4===0;
      out.push({id:1000+i,hora:h+":00",status:(seed+i)%7===0?"cancelado":"confirmado",
        cliente_id:cidx+1,
        clientes:{nome:clientes[cidx],criado_em: novo? dataIso : "2026-01-15"},
        servicos:{nome:sv.nome,preco:sv.preco},barbeiros:{nome:bb.nome}});
    }
  });
  return out;
}

render();

/* ============================================================
   ROOT render: login ou shell
   ============================================================ */
function render(){
  if(!app.logado){ renderLogin(); return; }
  renderShell();
}

/* ============================================================
   LOGIN
   ============================================================ */
function renderLogin(){
  let modo="senha";
  root.innerHTML = `

/* carrega serviços, barbeiros, funcionamento */
async function carregarBase(){
  if(!configurado){ demoData(); return; }
  try{
    const [sv,bb,fn,cl]=await Promise.all([
      sb.from("servicos").select("*").order("id"),
      sb.from("barbeiros").select("*").order("id"),
      sb.from("funcionamento").select("*").order("dia_semana"),
      sb.from("config_lembretes").select("*").eq("id",1).maybeSingle(),
    ]);
    app.servicos=sv.data||[]; app.barbeiros=bb.data||[]; app.funcionamento=fn.data||[];
    app.configLembrete=cl.data||{ativo:true,antecedencia:30,canal:"whatsapp"};
  }catch(e){ console.error(e); demoData(); }
}

/* fetch de agendamentos de uma data */
async function fetchAgenda(dataIso){
  if(!configurado) return demoAgenda(dataIso);
  const { data, error } = await sb.from("agendamentos")
    .select("id,hora,status,cliente_id,clientes(nome,criado_em),servicos(nome,preco),barbeiros(nome)")
    .eq("data",dataIso).order("hora");
  if(error){ console.error(error); return []; }
  return data||[];
}

/* ============================================================
   VIEW: DASHBOARD
   ============================================================ */
async function viewDashboard(m){
  // agrega a semana atual
  const base=app.dataAtual; const day=base.getDay(); const diff=day===0?-6:1-day;
  const seg=addDays(base,diff); const dias=[]; for(let i=0;i<6;i++) dias.push(addDays(seg,i));
  const segIso=iso(seg), fimIso=iso(dias[5]);
  let todos=[];
  for(const dd of dias){ const a=await fetchAgenda(iso(dd)); todos=todos.concat(a.map(x=>({...x,_data:iso(dd),_dow:dd.getDay()}))); }
  const conf=todos.filter(a=>a.status==="confirmado");
  const cancel=todos.filter(a=>a.status==="cancelado");

  // --- KPIs de topo
  const cortes=conf.filter(a=>/corte/i.test(a.servicos?.nome||"")).length;
  const barbas=conf.filter(a=>/barba/i.test(a.servicos?.nome||"")).length;
  const fat=conf.reduce((s,a)=>s+Number(a.servicos?.preco||0),0);
  const ticket=conf.length?fat/conf.length:0;
  const taxaCancel=todos.length?(cancel.length/todos.length*100):0;

  // --- agregações
  // por serviço (quantidade e faturamento)
  const svcQtd={}, svcFat={};
  conf.forEach(a=>{const n=a.servicos?.nome||"—";svcQtd[n]=(svcQtd[n]||0)+1;svcFat[n]=(svcFat[n]||0)+Number(a.servicos?.preco||0);});
  const topSvc=Object.entries(svcQtd).sort((a,b)=>b[1]-a[1])[0];
  // por barbeiro (quantidade e faturamento)
  const bbQtd={}, bbFat={};
  conf.forEach(a=>{const n=a.barbeiros?.nome||"—";bbQtd[n]=(bbQtd[n]||0)+1;bbFat[n]=(bbFat[n]||0)+Number(a.servicos?.preco||0);});
  const topBb=Object.entries(bbQtd).sort((a,b)=>b[1]-a[1])[0];
  // por dia (faturamento e quantidade)
  const diaFat={}, diaQtd={};
  conf.forEach(a=>{diaFat[a._dow]=(diaFat[a._dow]||0)+Number(a.servicos?.preco||0);diaQtd[a._dow]=(diaQtd[a._dow]||0)+1;});
  const topDiaFat=Object.entries(diaFat).sort((a,b)=>b[1]-a[1])[0];
  const topDiaQtd=Object.entries(diaQtd).sort((a,b)=>b[1]-a[1])[0];
  // horários mais procurados
  const horaQtd={};
  conf.forEach(a=>{const h=(a.hora||"").slice(0,5);if(h)horaQtd[h]=(horaQtd[h]||0)+1;});
  const topHoras=Object.entries(horaQtd).sort((a,b)=>b[1]-a[1]).slice(0,4);
  // clientes novos x recorrentes (novo = cadastrado dentro da semana)
  const idsSemana=new Set(); const novosSet=new Set(); const recorrSet=new Set();
  conf.forEach(a=>{
    const id=a.cliente_id ?? a.clientes?.nome; if(id==null) return;
    idsSemana.add(id);
    const cad=(a.clientes?.criado_em||"").slice(0,10);
    if(cad && cad>=segIso && cad<=fimIso) novosSet.add(id); else recorrSet.add(id);
  });
  // se o cliente é novo, não conta também como recorrente
  novosSet.forEach(id=>recorrSet.delete(id));
  const novos=novosSet.size, recorrentes=recorrSet.size;

  const barra=(obj,fmt)=>{
    const ents=Object.entries(obj).sort((a,b)=>b[1]-a[1]);
    if(!ents.length) return '<div class="empty">Sem dados na semana.</div>';
    const max=Math.max(...ents.map(e=>e[1]));
    return ents.map(([n,v])=>`<div style="margin-bottom:13px">
      <div style="display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:5px"><span style="font-weight:600">${esc(n)}</span><span style="color:var(--steel-400)">${fmt(v)}</span></div>
      <div style="height:8px;background:var(--mist-100);border-radius:99px;overflow:hidden"><div style="height:100%;width:${(v/max*100).toFixed(0)}%;background:var(--mint);border-radius:99px"></div></div>
    </div>`).join("");
  };

  m.innerHTML=`
    ${menuToggleHTML()}
    <div class="page-head">
      <div><div class="ph-eyebrow">Dashboard de desempenho</div><h1>Visão da semana</h1>
        <div class="ph-sub">${seg.getDate()}/${seg.getMonth()+1} – ${dias[5].getDate()}/${dias[5].getMonth()+1}</div></div>
      <div class="datenav">
        <button id="prevD">‹</button><span class="dn-label">Semana</span><button id="nextD">›</button>
        <button class="btn btn-mint btn-sm" id="hojeD" style="margin-left:6px">Hoje</button>
      </div>
    </div>

    <!-- KPIs principais -->
    <div class="kpis">
      <div class="kpi"><div class="k-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4 12 6.5 9.5 4M6 9l-2 2 2 2m12-4 2 2-2 2"/><path d="m9.5 20 5-16"/></svg></div><div class="k-num">${cortes}</div><div class="k-lab">Cortes na semana</div></div>
      <div class="kpi"><div class="k-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12h8"/></svg></div><div class="k-num">${barbas}</div><div class="k-lab">Barbas na semana</div></div>
      <div class="kpi mint"><div class="k-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="k-num"><small>R$</small> ${fat.toFixed(0)}</div><div class="k-lab">Faturado na semana</div></div>
      <div class="kpi"><div class="k-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="k-num"><small>R$</small> ${ticket.toFixed(0)}</div><div class="k-lab">Ticket médio</div></div>
    </div>

    </div>
    <label style="display:flex;align-items:center;gap:10px;margin-top:6px;font-size:.9rem;font-weight:600">
      <span class="switch"><input type="checkbox" id="svA" ${(!ed||svc.ativo)?'checked':''}><span class="sl"></span></span> Serviço ativo</label>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="mCancel">Cancelar</button>
      <button class="btn btn-mint" id="mSave">${ed?'Salvar':'Adicionar'}</button>
    </div>`);
  document.getElementById("mCancel").addEventListener("click",closeModal);
  document.getElementById("mSave").addEventListener("click",async()=>{
    const obj={nome:document.getElementById("svN").value.trim(),preco:parseFloat(document.getElementById("svP").value)||0,
      duracao_min:parseInt(document.getElementById("svD").value)||30,ativo:document.getElementById("svA").checked};
    if(!obj.nome){alert("Informe o nome.");return;}
    if(configurado){
      if(ed) await sb.from("servicos").update(obj).eq("id",svc.id);
      else await sb.from("servicos").insert(obj);
    }else{
      if(ed) Object.assign(svc,obj); else app.servicos.push({id:Date.now(),...obj});
    }
    await carregarBase(); closeModal(); toast(ed?"Serviço atualizado":"Serviço adicionado"); renderView();
  });
}

async function viewLembretes(m){

      .select("id,canal,status,enviar_em,enviado_em,agendamentos(hora,clientes(nome),servicos(nome),barbeiros(nome))")
      .order("criado_em",{ascending:false}).limit(20);
    envios=data||[];
  }else{
    envios=demoEnvios();

  envios.forEach(e=>{contagem[e.status]=(contagem[e.status]||0)+1;});

  const canalLabel=c=>c==="sms"?"SMS":"WhatsApp";

    enviado:`<span class="tag ok">Enviado</span>`,
    falhou:`<span class="tag cancel">Falhou</span>`,
    pendente:`<span class="tag block">Pendente</span>`,
  }[s]||s);

/* ============================================================
   MODAIS auxiliares
   ============================================================ */
let modalEl=null;
function openModal(html){
  closeModal();
  modalEl=document.createElement("div"); modalEl.className="modal-bg";
  modalEl.innerHTML=`<div class="modal">${html}</div>`;
  modalEl.addEventListener("click",e=>{if(e.target===modalEl)closeModal();});
  document.body.appendChild(modalEl);
}
function closeModal(){ if(modalEl){modalEl.remove();modalEl=null;} }

function modalConfirm(titulo,texto,btnLabel,onOk){
  openModal(`
    <h3>${titulo}</h3><p class="m-sub">${texto}</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="mNo">Voltar</button>
      <button class="btn btn-danger" id="mYes">${btnLabel}</button>
    </div>`);
  document.getElementById("mNo").addEventListener("click",closeModal);
  document.getElementById("mYes").addEventListener("click",()=>{closeModal();onOk();});
}

function modalBloqueio(dataIso){
  const horas=[]; for(let h=9;h<19;h++){horas.push(String(h).padStart(2,"0")+":00");horas.push(String(h).padStart(2,"0")+":30");}
  openModal(`
    <h3>Bloquear horário</h3>
    <p class="m-sub">Reserve um horário (folga, almoço, imprevisto) para que clientes não agendem.</p>
    <div class="field"><label>Data</label><input id="blkData" type="date" value="${dataIso}"></div>
    <div class="field"><label>Barbeiro</label>
      <select id="blkBb" style="width:100%;border:1.5px solid var(--mist-100);border-radius:12px;padding:13px;font-family:var(--font-body);font-size:.95rem">
        <option value="">Todos</option>${app.barbeiros.map(b=>`<option value="${b.id}">${esc(b.nome)}</option>`).join("")}</select></div>
    <div class="field"><label>Horário</label>
      <select id="blkHora" style="width:100%;border:1.5px solid var(--mist-100);border-radius:12px;padding:13px;font-family:var(--font-body);font-size:.95rem">
        <option value="">Dia inteiro</option>${horas.map(h=>`<option value="${h}">${h}</option>`).join("")}</select></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="mNo">Cancelar</button>
      <button class="btn btn-mint" id="mYes">Bloquear</button>
    </div>`);
  document.getElementById("mNo").addEventListener("click",closeModal);
  document.getElementById("mYes").addEventListener("click",async()=>{
    const obj={data:document.getElementById("blkData").value,
      barbeiro_id:document.getElementById("blkBb").value||null,
      hora:document.getElementById("blkHora").value||null, motivo:"Bloqueado pelo dono"};
    if(configurado){ await sb.from("bloqueios").insert(obj); }
    closeModal(); toast("Horário bloqueado 🔒");
  });
}

function modalReagendar(id, ag){
  const horas=[]; for(let h=9;h<19;h++){horas.push(String(h).padStart(2,"0")+":00");horas.push(String(h).padStart(2,"0")+":30");}
  openModal(`
    <h3>Reagendar cliente</h3>
    <p class="m-sub">${esc(ag?.clientes?.nome||"Cliente")} · ${esc(ag?.servicos?.nome||"")}</p>
    <div class="field"><label>Nova data</label><input id="rsData" type="date" value="${iso(app.dataAtual)}"></div>
    <div class="field"><label>Novo horário</label>
      <select id="rsHora" style="width:100%;border:1.5px solid var(--mist-100);border-radius:12px;padding:13px;font-family:var(--font-body);font-size:.95rem">
        ${horas.map(h=>`<option value="${h}" ${ag&&ag.hora.slice(0,5)===h?'selected':''}>${h}</option>`).join("")}</select></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="mNo">Cancelar</button>
      <button class="btn btn-mint" id="mYes">Reagendar</button>
    </div>`);
  document.getElementById("mNo").addEventListener("click",closeModal);
  document.getElementById("mYes").addEventListener("click",async()=>{
    const novaData=document.getElementById("rsData").value, novaHora=document.getElementById("rsHora").value;
    if(configurado){
      const { error } = await sb.from("agendamentos").update({data:novaData,hora:novaHora}).eq("id",id);
      if(error){ alert("Esse horário pode já estar ocupado. Tente outro."); return; }
    }
    closeModal(); toast("Cliente reagendado ✓"); renderView();
  });
}

/* toast */
let toastT=null;
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast";
    t.style.cssText="position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--graphite-900);color:#fff;padding:13px 22px;border-radius:13px;font-weight:600;font-size:.92rem;box-shadow:var(--shadow-soft);z-index:200;transition:transform .3s cubic-bezier(.2,.8,.3,1.2);font-family:var(--font-display)";
    document.body.appendChild(t); }
  t.textContent=msg;
  requestAnimationFrame(()=>{t.style.transform="translateX(-50%) translateY(0)";});
  clearTimeout(toastT);
  toastT=setTimeout(()=>{t.style.transform="translateX(-50%) translateY(80px)";},2400);
}
